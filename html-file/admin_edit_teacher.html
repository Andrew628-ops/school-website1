<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-primary: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --focus-ring: #93c5fd;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
            color: #4f46e5; /* Matching the Indigo profile header */
        }

        .edit-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-main);
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .form-actions {
            margin-top: 28px;
            display: flex;
            gap: 12px;
        }

        input[type="submit"], .btn-cancel {
            flex: 1;
            padding: 11px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
            text-decoration: none;
        }

        input[type="submit"] {
            background-color: var(--accent-primary);
            color: #ffffff;
            border: none;
        }

        input[type="submit"]:hover {
            background-color: var(--accent-hover);
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-cancel:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <h2>Edit Profile</h2>
    
    <div class="edit-card">
        <form action="/admin/edit-teacher" method="post">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{.Name}}">
            </div>
            
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" value="{{.Subject}}">
            </div>
            
            <div class="form-group">
                <label for="dept">Department</label>
                <input type="text" id="dept" name="dept" value="{{.Department}}">
            </div>
            
            <div class="form-group">
                <label for="image">Img</label>
                <input type="text" id="image" name="image" value="{{.Image}}">
            </div>
            
            <input type="hidden" name="id" value="{{.ID}}"> 

            <div class="form-actions">
                <a href="/admin/dashboard" class="btn-cancel">Cancel</a>
                <input type="submit" value="Save Changes">
            </div>
        </form>
    </div>
</body>
</html>
